services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/investsuite.db
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:3000}
      - FrontendUrl=${FRONTEND_URL:-http://localhost:3000}
      - Claude__ApiKey=${CLAUDE_API_KEY}
      - Claude__Model=${CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      - Claude__CliModel=${CLAUDE_CLI_MODEL:-claude-haiku-4-5-20251001}
      - Claude__BaseUrl=https://api.anthropic.com
      - Claude__MaxTokens=${CLAUDE_MAX_TOKENS:-2048}
    volumes:
      - investsuite_data:/data
    restart: unless-stopped

volumes:
  investsuite_data:
